<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Горски Магазин</title>
    <style>
      * {
        margin: 0;

    </div>

      СТРЕЛКИ или WASD = Движение &nbsp;|&nbsp; SPACE = Действие &nbsp;|&nbsp; ESC = Пауза

    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <script>
      const W = 1280,
        H = 680;

      // ── Audio context unlock (browsers block audio until a user gesture) ──
      // Phaser's sound manager exposes the WebAudio context via game.sound.context.
      // We hook a one-time listener on the canvas so the very first keypress or
      // click resumes it. After that, all sound.play() calls work normally.
      function unlockAudio(game) {
        const resume = () => {
          if (game.sound && game.sound.context && game.sound.context.state === "suspended") {
            game.sound.context.resume();
          }
        };
        document.addEventListener("keydown", resume, { once: true });
        document.addEventListener("pointerdown", resume, { once: true });
      }

      // Thin wrapper: play a sound only if the key was successfully loaded.
      // Avoids "Cannot play audio" errors when asset files are missing.
      function sfx(scene, key, cfg = {}) {
        try {
          if (scene.cache.audio.has(key)) scene.sound.play(key, cfg);
        } catch (_) {}
      }

      // ============================================================
      // ГЛОБАЛНА ФУНКЦИЯ ЗА "GAME OVER"
      // ============================================================
      function showGameOverScreen(scene, message, textColor = "#ef9a9a") {
        scene.gameState = "OVER";
        if (scene.bgm) scene.bgm.stop();

        // Тъмен фон
        scene.add.rectangle(W / 2, H / 2, W, H, 0x000000, 0.85).setDepth(100);

        // Заглавие
        scene.add
          .text(W / 2, H / 2 - 60, message, {
            fontFamily: "Arial",
            fontSize: "46px",
            color: textColor,
            fontStyle: "bold",
            stroke: "#000",
            strokeThickness: 4,
          })
          .setOrigin(0.5)
          .setDepth(101);

        // Универсална функция за чертане на бутон с персонален цвят на текста
        const bW = 240,
          bH = 60;
        const createBtn = (x, y, text, color, hoverColor, textColorBtn, onClick) => {
          const bg = scene.add.graphics().setDepth(102);
          const draw = (hov) => {
            bg.clear();
            bg.fillStyle(hov ? hoverColor : color, 1);
            bg.fillRoundedRect(x - bW / 2, y - bH / 2, bW, bH, 12);
            bg.lineStyle(3, hov ? 0xffffff : 0xcccccc, hov ? 1 : 0.7);
            bg.strokeRoundedRect(x - bW / 2, y - bH / 2, bW, bH, 12);
          };
          draw(false);

          const txt = scene.add
            .text(x, y, text, {
              fontFamily: "Arial",
              fontSize: "18px",
              color: textColorBtn,
              fontStyle: "bold",
              stroke: "#000000",
              strokeThickness: 3,
            })
            .setOrigin(0.5)
            .setDepth(103);

          const zone = scene.add.zone(x, y, bW, bH).setInteractive().setDepth(104);
          zone.on("pointerover", () => {
            draw(true);
            txt.setScale(1.05);
          });
          zone.on("pointerout", () => {
            draw(false);
            txt.setScale(1);
          });
          zone.on("pointerdown", onClick);
        };

        const currentKey = scene.scene.key;

        // 1. Бутон за Рестарт - Тъмносин дизайн (съвпада с Паузата)
        createBtn(W / 2 - 135, H / 2 + 30, "↺ РЕСТАРТ НИВО", 0x1a2a3a, 0x1e3d52, "#b3e5fc", () => {
          scene.scene.start(currentKey);
        });

        // 2. Бутон за Начало - Тъмночервен дизайн (съвпада с Паузата)
        createBtn(W / 2 + 135, H / 2 + 30, "⏮ КЪМ НАЧАЛО", 0x3e1a1a, 0x6d2a2a, "#ffcdd2", () => {
          scene.scene.start("StartScene");
        });
      }

      // ============================================================

        // ФИНАЛ (Cutscene):

        // НИВО 3 (Пространствени задачи - гласови указания):
        // scene.load.audio("voice_hint_0", "assets/audio/voice/hint_0.mp3");
        // scene.load.audio("voice_hint_1", "assets/audio/voice/hint_1.mp3");
        // scene.load.audio("voice_hint_2", "assets/audio/voice/hint_2.mp3");
        // scene.load.audio("voice_hint_3", "assets/audio/voice/hint_3.mp3");
        // scene.load.audio("voice_hint_4", "assets/audio/voice/hint_4.mp3");
      }

      function updateCharacterDirection(sprite, dx, dy, isMoving, tempTimer) {
        if (isMoving) {
          let frame = sprite.frame.name;

          if (dx < 0 && dy > 0) frame = 6;
          else if (dx === 0 && dy > 0) frame = 4;
          else if (dx > 0 && dy > 0) frame = 7;
          else if (dx < 0 && dy === 0) frame = 3;
          else if (dx > 0 && dy === 0) frame = 5;
          else if (dx < 0 && dy < 0) frame = 0;
          else if (dx === 0 && dy < 0) frame = 1;
          else if (dx > 0 && dy < 0) frame = 2;

          sprite.setFrame(frame);

          const bob = Math.sin(tempTimer * 0.015) * 0.1;
          sprite.setScale(3.5, 3.5 + bob);
        } else {
          sprite.setScale(3.5, 3.5);
        }
      }

      const Draw = {
        shape(gfx, type, x, y, s, col, alpha = 1) {
          gfx.fillStyle(col, alpha);
          gfx.lineStyle(3, 0x000000, alpha * 0.5);
          switch (type) {
            case "circle":
              gfx.fillCircle(x, y, s * 1.1);
              gfx.strokeCircle(x, y, s * 1.1);
              break;
            case "square":
              gfx.fillRect(x - s, y - s, s * 2, s * 2);
              gfx.strokeRect(x - s, y - s, s * 2, s * 2);
              break;
            case "triangle": {
              const pts = [
                { x, y: y - s * 1.3 },
                { x: x - s * 1.1, y: y + s * 0.9 },
                { x: x + s * 1.1, y: y + s * 0.9 },
              ];
              gfx.fillPoints(pts, true);
              gfx.strokePoints(pts, true);
              break;
            }
            case "rectangle":
              gfx.fillRect(x - s * 1.5, y - s * 0.8, s * 3, s * 1.6);
              gfx.strokeRect(x - s * 1.5, y - s * 0.8, s * 3, s * 1.6);
              break;
            case "diamond": {
              const pts = [
                { x, y: y - s * 1.3 },
                { x: x + s, y },
                { x, y: y + s * 1.3 },
                { x: x - s, y },
              ];
              gfx.fillPoints(pts, true);
              gfx.strokePoints(pts, true);
              break;
            }
          }
        },
      };

      // ============================================================
      // GLOBAL VOLUME STATE  (shared across all scenes)
      // ============================================================
      const VOL = { master: 0.8, music: 0.6, sfx: 0.8 };

      // ============================================================
      // START SCENE
      // ============================================================
      class StartScene extends Phaser.Scene {
        constructor() {
          super({ key: "StartScene" });
          this._selectedLevel = 0; // 0 = play from beginning
        }
        preload() {
          preloadCommonAssets(this);
        }
        create() {
          document.getElementById("game-title").textContent = "🌲 ГОРСКИ МАГАЗИН 🐻";
          document.getElementById("game-subtitle").textContent = "Трета група · Математика";

          this.add.image(0, 0, "outside_night").setOrigin(0).setDisplaySize(W, H);
          // Rich gradient overlay: deep forest floor at bottom, dark sky at top
          const grad = this.add.graphics().setDepth(0);
          grad.fillGradientStyle(0x000000, 0x000000, 0x001a08, 0x001a08, 0.72, 0.72, 0.38, 0.38);

          // Decorative firefly particles

            .setDepth(4);

          // ── Level selector cards ────────────────────────────────
          const levels = [
            {
              scene: "ForestScene",

              title: "НИВО 1",
              sub: "Геометрични фигури",
              desc: "Занеси правилните\nфигури на животните",
              col: 0x1b5e20,
              border: 0x4caf50,
              textCol: "#c8e6c9",
            },
            {
              scene: "ShopScene",
              icon: "🛒",
              title: "НИВО 2",
              sub: "Броене до 10",
              desc: "Обслужвай клиентите\nв горския магазин",
              col: 0x1a3720,
              border: 0x81c784,
              textCol: "#b2dfdb",

              scene: "PartyScene",

              border: 0xce93d8,
              textCol: "#f3e5f5",
            },
          ];

          const cardW = 310,
            cardH = 240;
          const cardGap = 32;
          const totalW = levels.length * cardW + (levels.length - 1) * cardGap;
          const startX = (W - totalW) / 2;
          const cardY = 270;

          this._cardGraphics = this.add.graphics().setDepth(5);
          this._selectedCard = -1; // -1 means "play from start"

          levels.forEach((lvl, i) => {
            const cx = startX + i * (cardW + cardGap);

            // Draw card background
            this._drawCard(this._cardGraphics, cx, cardY, cardW, cardH, lvl, false);

            // Icon
            this.add
              .text(cx + cardW / 2, cardY + 46, lvl.icon, { fontSize: "44px" })

              .setDepth(6);

            // Title
            this.add
              .text(cx + cardW / 2, cardY + 96, lvl.title, {
                fontFamily: "Arial",
                fontSize: "26px",
                color: lvl.textCol,
                fontStyle: "bold",
                stroke: "#000",
                strokeThickness: 4,
              })
              .setOrigin(0.5)
              .setDepth(6);

            // Sub-heading
            this.add
              .text(cx + cardW / 2, cardY + 126, lvl.sub, {
                fontFamily: "Arial",
                fontSize: "13px",
                color: "#aed581",
                stroke: "#000",
                strokeThickness: 2,
              })
              .setOrigin(0.5)
              .setDepth(6);

            // Description
            this.add
              .text(cx + cardW / 2, cardY + 168, lvl.desc, {
                fontFamily: "Arial",
                fontSize: "15px",
                color: "#e0e0e0",
                align: "center",
                stroke: "#000",
                strokeThickness: 2,
                wordWrap: { width: cardW - 24 },
              })
              .setOrigin(0.5)
              .setDepth(6);

            // Hover zone
            const zone = this.add
              .zone(cx + cardW / 2, cardY + cardH / 2, cardW, cardH)
              .setInteractive()
              .setDepth(7);

            zone.on("pointerover", () => {
              this._selectedCard = i;
              this._redrawCards(levels, startX, cardY, cardW, cardH, cardGap);
            });
            zone.on("pointerout", () => {
              this._selectedCard = -1;
              this._redrawCards(levels, startX, cardY, cardW, cardH, cardGap);
            });
            zone.on("pointerdown", () => {
              this._launchLevel(lvl.scene);
            });
          });

          // Store for redraw
          this._levels = levels;
          this._startX = startX;
          this._cardY = cardY;
          this._cardW = cardW;
          this._cardH = cardH;
          this._cardGap = cardGap;

          // ── PLAY button (start from level 1) ────────────────────
          const btnX = W / 2,
            btnY = cardY + cardH + 90;
          const btnW = 320,
            btnH = 62;
          this._btnGfx = this.add.graphics().setDepth(8);
          this._drawPlayBtn(false);

          this._btnTxt = this.add
            .text(btnX, btnY, "▶   ИГРАЙ ОТ НАЧАЛО", {
              fontFamily: "Arial",
              fontSize: "26px",
              color: "#c8e6c9",
              fontStyle: "bold",
              stroke: "#000",
              strokeThickness: 4,
            })
            .setOrigin(0.5)
            .setDepth(9);

          const btnZone = this.add.zone(btnX, btnY, btnW, btnH).setInteractive().setDepth(10);
          btnZone.on("pointerover", () => {
            this._drawPlayBtn(true);
            this._btnTxt.setColor("#ffffff");
          });
          btnZone.on("pointerout", () => {
            this._drawPlayBtn(false);
            this._btnTxt.setColor("#c8e6c9");
          });
          btnZone.on("pointerdown", () => this._launchLevel("ForestScene"));
          this._btnX = btnX;
          this._btnY = btnY;
          this._btnW = btnW;
          this._btnH = btnH;

          // ── Keyboard shortcuts ──────────────────────────────────
          this.input.keyboard.once("keydown-SPACE", () => this._launchLevel("ForestScene"));
          this.input.keyboard.once("keydown-ENTER", () => this._launchLevel("ForestScene"));

          this.cameras.main.fadeIn(700);
        }

        _drawCard(gfx, cx, cy, cw, ch, lvl, selected) {
          gfx.fillStyle(lvl.col, selected ? 1 : 0.82);
          gfx.fillRoundedRect(cx, cy, cw, ch, 18);
          gfx.lineStyle(selected ? 4 : 2, lvl.border, selected ? 1 : 0.55);
          gfx.strokeRoundedRect(cx, cy, cw, ch, 18);
          if (selected) {
            // Glow ring
            gfx.lineStyle(10, lvl.border, 0.18);
            gfx.strokeRoundedRect(cx - 4, cy - 4, cw + 8, ch + 8, 22);
          }
        }

        _redrawCards(levels, startX, cardY, cardW, cardH, cardGap) {
          this._cardGraphics.clear();
          levels.forEach((lvl, i) => {
            const cx = startX + i * (cardW + cardGap);
            this._drawCard(
              this._cardGraphics,
              cx,
              cardY,
              cardW,
              cardH,
              lvl,
              this._selectedCard === i,
            );
          });
        }

        _drawPlayBtn(hover) {
          this._btnGfx.clear();
          this._btnGfx.fillStyle(hover ? 0x2e7d32 : 0x1b5e20, 1);
          this._btnGfx.fillRoundedRect(
            this._btnX - this._btnW / 2,
            this._btnY - this._btnH / 2,
            this._btnW,
            this._btnH,
            18,
          );
          this._btnGfx.lineStyle(3, hover ? 0xa5d6a7 : 0x4caf50, 1);
          this._btnGfx.strokeRoundedRect(
            this._btnX - this._btnW / 2,
            this._btnY - this._btnH / 2,
            this._btnW,
            this._btnH,
            18,
          );
          if (hover) {
            this._btnGfx.lineStyle(8, 0x81c784, 0.2);
            this._btnGfx.strokeRoundedRect(
              this._btnX - this._btnW / 2 - 4,
              this._btnY - this._btnH / 2 - 4,
              this._btnW + 8,
              this._btnH + 8,
              22,
            );
          }
        }

        _buildVolumeControls() {
          // Small panel bottom-right
          const px = W - 240,
            py = H - 128;
          const pg = this.add.graphics().setDepth(8);
          pg.fillStyle(0x071a04, 0.82);
          pg.fillRoundedRect(px, py, 228, 116, 12);
          pg.lineStyle(2, 0x2e7d32, 0.8);
          pg.strokeRoundedRect(px, py, 228, 116, 12);

          this.add
            .text(px + 114, py + 16, "🔊 ЗВУК", {
              fontFamily: "Arial",
              fontSize: "14px",
              color: "#81c784",
              fontStyle: "bold",
              stroke: "#000",
              strokeThickness: 2,
            })
            .setOrigin(0.5)
            .setDepth(9);

          const sliders = [
            { label: "Музика", key: "music", y: py + 44 },
            { label: "Ефекти", key: "sfx", y: py + 80 },
          ];

          sliders.forEach(({ label, key, y }) => {
            this.add
              .text(px + 10, y + 2, label, {
                fontFamily: "Arial",
                fontSize: "13px",
                color: "#a5d6a7",
                stroke: "#000",
                strokeThickness: 2,
              })
              .setDepth(9);

            const trackX = px + 82,
              trackW = 128,
              trackH = 10;
            const trackG = this.add.graphics().setDepth(9);
            const drawTrack = () => {
              trackG.clear();
              // Track background
              trackG.fillStyle(0x1b5e20, 1);
              trackG.fillRoundedRect(trackX, y, trackW, trackH, 5);
              // Fill
              trackG.fillStyle(0x4caf50, 1);
              trackG.fillRoundedRect(trackX, y, trackW * VOL[key], trackH, 5);
              // Thumb
              const tx = trackX + trackW * VOL[key];
              trackG.fillStyle(0xc8e6c9, 1);
              trackG.fillCircle(tx, y + trackH / 2, 8);
              trackG.lineStyle(2, 0x2e7d32, 1);
              trackG.strokeCircle(tx, y + trackH / 2, 8);
            };
            drawTrack();

            // Interactive drag zone for the whole track
            const hitZone = this.add
              .zone(trackX + trackW / 2, y + trackH / 2, trackW + 16, 24)
              .setInteractive()
              .setDepth(10);
            const setVol = (px_) => {
              const rel = Phaser.Math.Clamp((px_ - trackX) / trackW, 0, 1);
              VOL[key] = rel;
              drawTrack();
            };
            hitZone.on("pointerdown", (ptr) => setVol(ptr.x));
            hitZone.on("pointermove", (ptr) => {
              if (ptr.isDown) setVol(ptr.x);
            });
          });
        }

        _launchLevel(sceneKey) {
          this.cameras.main.fade(500, 0, 0, 0, false, (_, p) => {
            if (p >= 1) this.scene.start(sceneKey);
          });
        }

        update(_, delta) {
          this._t += delta / 1000;
          this._flyGfx.clear();
          this._flies.forEach((f) => {
            f.phase += (f.speed * delta) / 1000;
            const fx = f.x + Math.cos(f.phase) * f.radius * 0.18;
            const fy = f.y + Math.sin(f.phase * 0.7) * 40;
            const alpha = 0.35 + 0.45 * Math.abs(Math.sin(f.phase * 1.3));
            this._flyGfx.fillStyle(0xccff66, alpha);
            this._flyGfx.fillCircle(fx, fy, 2.5);
            // Soft glow
            this._flyGfx.fillStyle(0xccff66, alpha * 0.18);
            this._flyGfx.fillCircle(fx, fy, 7);
          });

          // Bob the animals
          this._animalSprites.forEach((s, i) => {
            s.y = H - 72 + Math.sin(this._t * 1.1 + i * 0.9) * 3;
          });
        }
      }

        }

          this.scene.bringToTop(); // Гарантира, че паузата е най-отпред

          // ── Blurred backdrop ─────────────────────────────────────

            .rectangle(W / 2, H / 2, W, H, 0x000000, 0.68)

          g.lineStyle(1, 0x81c784, 0.25);
          g.strokeRoundedRect(px + 6, py + 6, panelW - 12, panelH - 12, 18);

          // ── Title ────────────────────────────────────────────────
          this.add
            .text(W / 2, py + 52, "⏸  ПАУЗА", {
              fontFamily: "Arial",
              fontSize: "52px",
              color: "#c8e6c9",
              fontStyle: "bold",
              stroke: "#000",
              strokeThickness: 7,
            })
            .setOrigin(0.5)
            .setDepth(202);

          // Thin divider
          const divG = this.add.graphics().setDepth(202);
          divG.lineStyle(1, 0x2e7d32, 0.7);
          divG.lineBetween(px + 30, py + 82, px + panelW - 30, py + 82);

          // ── Volume controls ──────────────────────────────────────
          this.add
            .text(W / 2, py + 108, "🔊  КОНТРОЛ НА ЗВУКА", {
              fontFamily: "Arial",
              fontSize: "18px",
              color: "#81c784",
              fontStyle: "bold",
              stroke: "#000",
              strokeThickness: 3,
            })
            .setOrigin(0.5)
            .setDepth(202);

          const volSliders = [
            { label: "Музика", key: "music", y: py + 146 },
            { label: "Ефекти", key: "sfx", y: py + 196 },
            { label: "Главен", key: "master", y: py + 246 },
          ];

          volSliders.forEach(({ label, key, y }) => {
            this.add
              .text(px + 40, y - 4, label + ":", {
                fontFamily: "Arial",
                fontSize: "16px",
                color: "#a5d6a7",
                stroke: "#000",
                strokeThickness: 2,
              })
              .setDepth(203);

            const trackX = px + 126,
              trackW = panelW - 210,
              trackH = 12;

            const pctTxt = this.add
              .text(trackX + trackW + 15, y + trackH / 2, Math.round(VOL[key] * 100) + "%", {
                fontFamily: "Arial",
                fontSize: "16px",
                color: "#c8e6c9",
                stroke: "#000",
                strokeThickness: 2,
              })
              .setOrigin(0, 0.5)
              .setDepth(205);

            const trackG = this.add.graphics().setDepth(203);

            const drawTrack = () => {
              trackG.clear();
              trackG.fillStyle(0x1a3d1a, 1);
              trackG.fillRoundedRect(trackX, y, trackW, trackH, 6);
              const fillCol = key === "master" ? 0xffb300 : key === "sfx" ? 0x29b6f6 : 0x4caf50;
              trackG.fillStyle(fillCol, 1);
              trackG.fillRoundedRect(trackX, y, Math.max(trackH, trackW * VOL[key]), trackH, 6);
              trackG.fillStyle(0xffffff, 0.9);
              trackG.fillCircle(trackX + trackW * VOL[key], y + trackH / 2, 9);
              trackG.lineStyle(2, 0x333333, 0.6);
              trackG.strokeCircle(trackX + trackW * VOL[key], y + trackH / 2, 9);
              pctTxt.setText(Math.round(VOL[key] * 100) + "%");
            };
            drawTrack();

            const hitZone = this.add
              .zone(trackX + trackW / 2, y + trackH / 2, trackW + 20, 28)
              .setInteractive()
              .setDepth(204);
            const setVol = (px_) => {
              VOL[key] = Phaser.Math.Clamp((px_ - trackX) / trackW, 0, 1);
              drawTrack();
              if (this._caller && this._caller.bgm) {
                if (key === "music" || key === "master")
                  this._caller.bgm.setVolume(VOL.music * VOL.master);
              }
            };
            hitZone.on("pointerdown", (ptr) => setVol(ptr.x));
            hitZone.on("pointermove", (ptr) => {
              if (ptr.isDown) setVol(ptr.x);
            });
          });

          // ── Divider ──────────────────────────────────────────────
          divG.lineStyle(1, 0x2e7d32, 0.7);
          divG.lineBetween(px + 30, py + 286, px + panelW - 30, py + 286);

          // ── Action buttons ───────────────────────────────────────
          const btnDefs = [
            {
              label: "▶  ПРОДЪЛЖИ",
              col: 0x1b5e20,
              hov: 0x2e7d32,
              border: 0x4caf50,
              tc: "#c8e6c9",
              action: "resume",
            },
            {
              label: "↺  РЕСТАРТ НИВО",
              col: 0x1a2a3a,
              hov: 0x1e3d52,
              border: 0x29b6f6,
              tc: "#b3e5fc",
              action: "restartLevel",
            },
            {
              label: "⏮  КЪМ НАЧАЛО",
              col: 0x3e1a1a,
              hov: 0x6d2a2a,
              border: 0xef9a9a,
              tc: "#ffcdd2",
              action: "restartGame",
            },
          ];

          const bW = 174,
            bH = 52,
            bGap = 12;
          const bTotalW = btnDefs.length * bW + (btnDefs.length - 1) * bGap;
          const bStartX = W / 2 - bTotalW / 2;
          const bY = py + 330;

          btnDefs.forEach((bd, i) => {
            const bx = bStartX + i * (bW + bGap);
            const bcx = bx + bW / 2;
            const bg = this.add.graphics().setDepth(203);
            const draw = (h) => {
              bg.clear();
              bg.fillStyle(h ? bd.hov : bd.col, 1);
              bg.fillRoundedRect(bx, bY, bW, bH, 14);
              bg.lineStyle(2, bd.border, h ? 1 : 0.7);
              bg.strokeRoundedRect(bx, bY, bW, bH, 14);
            };
            draw(false);
            const txt = this.add
              .text(bcx, bY + bH / 2, bd.label, {
                fontFamily: "Arial",
                fontSize: "15px",
                color: bd.tc,
                fontStyle: "bold",
                stroke: "#000",
                strokeThickness: 3,
              })
              .setOrigin(0.5)
              .setDepth(204);

            const zone = this.add
              .zone(bcx, bY + bH / 2, bW, bH)
              .setInteractive()
              .setDepth(205);
            zone.on("pointerover", () => {
              draw(true);
              txt.setScale(1.04);
            });
            zone.on("pointerout", () => {
              draw(false);
              txt.setScale(1);
            });
            zone.on("pointerdown", () => {
              if (bd.action === "resume") this._resume();
              else if (bd.action === "restartLevel") this._restartLevel();
              else if (bd.action === "restartGame") this._restartGame();
            });
          });

          // ── Keyboard hint ─────────────────────────────────────────
          this.add
            .text(W / 2, py + panelH - 22, "SPACE / ESC — продължи    R — рестарт ниво", {
              fontFamily: "Arial",
              fontSize: "14px",
              color: "#4caf50",
              stroke: "#000",
              strokeThickness: 2,
            })
            .setOrigin(0.5)
            .setDepth(202);

          // ── Keyboard shortcuts ────────────────────────────────────
          const resume = () => this._resume();
          this.input.keyboard.on("keydown-SPACE", resume);
          this.input.keyboard.on("keydown-ESC", resume);
          this.input.keyboard.on("keydown-R", () => this._restartLevel());
        }

        // ==========================================================
        // МЕТОДИ НА КЛАСА (Липсваха в предишното ви копиране)
        // ==========================================================

        _resume() {
          if (this._caller && this._caller.bgm && !this._caller.bgm.isPlaying)
            this._caller.bgm.resume();
          if (this._caller) this._caller.gameState = "PLAYING";
          this.scene.stop();
        }

        _restartLevel() {
          this.scene.stop();
          if (this._caller) {
            if (this._caller.bgm) this._caller.bgm.stop();
            this._caller.scene.start(this._callerKey || "ForestScene");
          }
        }

        _restartGame() {
          this.scene.stop();
          if (this._caller) {
            if (this._caller.bgm) this._caller.bgm.stop();
            this._caller.scene.start("StartScene");
          }
        }
      }

          this.cursors = this.input.keyboard.createCursorKeys();

          this.input.keyboard.on("keydown-SPACE", () => this.tryAction());
          this.input.keyboard.on("keydown-ESC", () => {
            if (this.gameState !== "PLAYING") return;
            this.gameState = "PAUSED";
            if (this.bgm) this.bgm.pause();
            this.scene.launch("PauseScene", { caller: this });
          });

          this.add.rectangle(0, 0, W, 58, 0x0a1a07).setOrigin(0, 0).setDepth(24);
          this.scoreText = this.add
            .text(20, 14, `🌲 Доставени: 0 / ${this.totalNeeded}`, {
              fontFamily: "Arial",
              fontSize: "26px",
              color: "#c8e6c9",
              fontStyle: "bold",
            })
            .setDepth(25);
          this.errorText = this.add
            .text(W - 20, 14, `❌ Грешки: 0 / ${L1.MAX_ERRORS}`, {
              fontFamily: "Arial",
              fontSize: "26px",
              color: "#ff8a80",
              fontStyle: "bold",
            })
            .setOrigin(1, 0)
            .setDepth(25);
          this.carryText = this.add
            .text(W / 2, 66, "Намери правилната фигура и я занеси на животното!", {
              fontFamily: "Arial",
              fontSize: "19px",
              color: "#FFD700",
              fontStyle: "bold",
              stroke: "#000",
              strokeThickness: 4,
            })
            .setOrigin(0.5, 0)
            .setDepth(25);

          this.carriedItemIcon = this.add.graphics().setDepth(16);

          this._buildAnimalBubbles();
          this.cameras.main.fadeIn(500);
        }

        _buildAnimalBubbles() {
          this.bubbleGfxArr = [];
          this.animals.forEach((a) => {
            // Compact square bubble — shape only, no text
            const bw1 = 64,
              bh1 = 64;
            const bx = a.x - bw1 / 2,
              by = a.y - 105;
            const bg = this.add.graphics().setDepth(7);
            bg.fillStyle(0xffffff, 0.92);
            bg.fillRoundedRect(bx, by, bw1, bh1, 10);
            bg.lineStyle(3, 0x333333, 1);
            bg.strokeRoundedRect(bx, by, bw1, bh1, 10);
            bg.fillStyle(0xffffff, 0.92);
            bg.fillTriangle(a.x - 5, by + bh1, a.x + 5, by + bh1, a.x, by + bh1 + 14);
            const sg = this.add.graphics().setDepth(8);
            Draw.shape(sg, a.shape, a.x, by + bh1 / 2, 16, SHAPE_COLORS[a.shape]);
            // No text label in L1 bubble — shape graphic only (child-friendly)
            this.bubbleGfxArr.push({ bg, sg, lt: null, animal: a });
          });
        }

        tryAction() {
          if (this.gameState !== "PLAYING") return;
          const ox = this.playerSprite.x,
            oy = this.playerSprite.y;

          if (!this.carrying) {
            let closest = null,
              minD = 90;
            this.shapes.forEach((s) => {
              if (s.picked) return;
              const d = Phaser.Math.Distance.Between(ox, oy, s.x, s.y);
              if (d < minD) {
                minD = d;
                closest = s;
              }
            });
            if (closest) {
              closest.picked = true;
              this.carrying = closest.type;
              this.carryText.setText(
                `Носиш: ${SHAPE_NAMES[this.carrying]} — занеси го на правилното животно!`,
              );
              this.showMsg(`Взе ${SHAPE_NAMES[this.carrying]}!`, 0xffee58, ox, oy);
              sfx(this, "pickup_shape", { volume: 0.7 });
            }
          } else {
            let closest = null,
              minD = 95;
            this.animals.forEach((a) => {
              if (a.done) return;
              const d = Phaser.Math.Distance.Between(ox, oy, a.x, a.y);
              if (d < minD) {
                minD = d;
                closest = a;
              }
            });
            if (closest) {
              if (this.carrying === closest.shape) {
                closest.done = true;
                this.delivered++;
                const e = this.bubbleGfxArr.find((b) => b.animal === closest);
                if (e) {
                  e.bg.destroy();
                  e.sg.destroy();
                  if (e.lt) e.lt.destroy();
                }
                this.showMsg(`✅ Браво! Правилен ${SHAPE_NAMES[this.carrying]}!`, 0x4caf50, ox, oy);
                sfx(this, "correct_place", { volume: 0.8 });
                this.carrying = null;
                this.carryText.setText("Намери правилната фигура и я занеси на животното!");
                this.scoreText.setText(`🌲 Доставени: ${this.delivered} / ${this.totalNeeded}`);
                this.checkEnd();
              } else {
                this.errors++;
                this.errorText.setText(`❌ Грешки: ${this.errors} / ${L1.MAX_ERRORS}`);
                this.showMsg(
                  `❌ ${closest.label} иска ${SHAPE_NAMES[closest.shape]}!`,
                  0xf44336,
                  ox,
                  oy,
                );
                sfx(this, "wrong_place", { volume: 0.7 });
                const obj = this.shapes.find((s) => s.type === this.carrying && s.picked);
                if (obj) obj.picked = false;
                this.carrying = null;
                this.carryText.setText("Намери правилната фигура и я занеси на животното!");
                this.checkEnd();
              }
            } else {
              const obj = this.shapes.find((s) => s.type === this.carrying && s.picked);
              if (obj) obj.picked = false;
              this.showMsg("Пусна фигурата.", 0xaaaaaa, ox, oy);
              this.carrying = null;
              this.carryText.setText("Намери правилната фигура и я занеси на животното!");
            }
          }
        }

        showMsg(text, color, x, y) {
          const t = this.add
            .text(x, y - 70, text, {
              fontFamily: "Arial",
              fontSize: "20px",
              color: "#" + color.toString(16).padStart(6, "0"),
              fontStyle: "bold",
              stroke: "#000",
              strokeThickness: 4,
            })
            .setOrigin(0.5)
            .setDepth(50);
          this.tweens.add({
            targets: t,
            y: t.y - 55,
            alpha: 0,
            duration: 2400,
            onComplete: () => t.destroy(),
          });
        }

        checkEnd() {
          if (this.errors >= L1.MAX_ERRORS) {
            showGameOverScreen(this, "ОПИТАЙ ПАК!", "#ef9a9a");
          } else if (this.delivered >= this.totalNeeded) {
            this.gameState = "OVER";
            if (this.bgm) this.bgm.stop();
            sfx(this, "level_complete", { volume: 0.9 });
            this.time.delayedCall(800, () => {
              this.cameras.main.fade(600, 0, 0, 0, false, (_, p) => {
                if (p >= 1) this.scene.start("TransitionScene");
              });
            });
          }
        }

        update(_, delta) {
          if (this.gameState !== "PLAYING") return;
          this.tempTimer += delta;

          let dx = 0,
            dy = 0;
          if (this.cursors.left.isDown || this.wasd.A.isDown) dx = -1;
          else if (this.cursors.right.isDown || this.wasd.D.isDown) dx = 1;
          if (this.cursors.up.isDown || this.wasd.W.isDown) dy = -1;
          else if (this.cursors.down.isDown || this.wasd.S.isDown) dy = 1;

          const isMoving = dx !== 0 || dy !== 0;

          if (isMoving) {
            if (dx && dy) {
              dx *= 0.707;
              dy *= 0.707;
            }
            this.playerSprite.x = Phaser.Math.Clamp(
              this.playerSprite.x + (dx * L1.SPEED * delta) / 1000,
              30,
              W - 30,
            );
            this.playerSprite.y = Phaser.Math.Clamp(
              this.playerSprite.y + (dy * L1.SPEED * delta) / 1000,
              65,
              H - 60,
            );
          }

          updateCharacterDirection(this.playerSprite, dx, dy, isMoving, this.tempTimer);

          this.animals.forEach((a) => {
            if (!a.done) {
              const adx = this.playerSprite.x - a.sprite.x;
              const ady = this.playerSprite.y - a.sprite.y;
              updateCharacterDirection(a.sprite, adx, ady, true, 0);
              a.sprite.setScale(3.5, 3.5);
            }
          });

          this.mainGfx.clear();
          this.carriedItemIcon.clear();

          this.shapes.forEach((s) => {
            if (!s.picked) {
              this.mainGfx.lineStyle(3, SHAPE_COLORS[s.type], 0.45);
              this.mainGfx.strokeCircle(s.x, s.y, 26);
              Draw.shape(this.mainGfx, s.type, s.x, s.y, 16, SHAPE_COLORS[s.type]);
            }
          });

          if (this.carrying) {
            Draw.shape(
              this.carriedItemIcon,
              this.carrying,
              this.playerSprite.x,
              this.playerSprite.y - 50,
              12,
              SHAPE_COLORS[this.carrying],
            );
          }
        }
      }

      // ============================================================
      // LEVEL 2: SHOP (ОБНОВЕНИ БАЛОНЧЕТА С ИСТИНСКИ СПРАЙТОВЕ)
      // ============================================================
      class Customer {
        constructor(scene, id, slotIndex) {
          this.scene = scene;
          this.id = id;
          this.slotIndex = slotIndex;

          const usedTypes = scene.customers.map((c) => c.animalType);
          const available = ANIMALS.filter((a) => !usedTypes.includes(a));
          this.animalType =
            available.length > 0
              ? Phaser.Utils.Array.GetRandom(available)
              : Phaser.Utils.Array.GetRandom(ANIMALS);

          this.targetItem = ANIMAL_PREFS[this.animalType];
          this.quantity = Phaser.Math.Between(L2.MIN_ORDER, L2.MAX_ORDER);

          this.targetX = scene.customerSlots[slotIndex].x;
          this.targetY = scene.customerSlots[slotIndex].y;

          this.x = ZONES.DOOR.x;
          this.y = ZONES.DOOR.y;

          this.sprite = scene.add
            .sprite(this.x, this.y, "sprite_" + this.animalType)
            .setScale(3.5)
            .setDepth(11);

          this.state = "walking";
          this.patience = L2.CUSTOMER_PATIENCE;
          this.elapsed = 0;
          this.tempTimer = 0;

          this.bubbleText = null;
          this.bubbleIcon = null; // Динамичен спрайт за балончето
        }

        update(delta) {
          this.tempTimer += delta;
          if (this.state === "walking") {
            const dx = this.targetX - this.x,
              dy = this.targetY - this.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 8) {
              this.x = this.targetX;
              this.y = this.targetY;
              this.state = "waiting";
              updateCharacterDirection(this.sprite, 0, 0, false, this.tempTimer);

              // Балончето се създава веднъж при пристигане на гишето
              // Иконата използва оригиналния зареден спрайт (carrot, fish, honey, acorn)
              // Compact bubble: fixed per-slot Y so multiple bubbles never overlap.
              // Slots 0,1,2 → by = 295, 295, 295 (same row — stagger X only).
              // Icon and quantity sit compactly inside the 100×64 bubble.
              const BY = 295;
              this.bubbleBy = BY; // remember for drawBubble()
              this.bubbleText = this.scene.add
                .text(this.x + 26, BY + 16, this.quantity.toString(), {
                  fontSize: "26px",
                  color: "#111",
                  fontStyle: "bold",
                })
                .setOrigin(0.5)
                .setDepth(16);

              this.bubbleIcon = this.scene.add
                .image(this.x - 22, BY + 24, this.targetItem)
                .setScale(1.8)
                .setDepth(16);
            } else {
              const step = 150 * (delta / 1000);
              this.x += (dx / dist) * step;
              this.y += (dy / dist) * step;
              this.sprite.x = this.x;
              this.sprite.y = this.y;
              updateCharacterDirection(this.sprite, dx, dy, true, this.tempTimer);
            }
          } else if (this.state === "waiting") {
            this.elapsed += delta;
            const player = this.scene.player;
            if (player) {
              const adx = player.x - this.x;
              const ady = player.y - this.y;
              updateCharacterDirection(this.sprite, adx, ady, true, 0);
              this.sprite.setScale(3.5, 3.5);
            }
            if (this.elapsed >= this.patience) {
              if (this.bubbleText) this.bubbleText.destroy();
              if (this.bubbleIcon) this.bubbleIcon.destroy();
              this.scene.onCustomerEvaluated(this, { ok: false, reason: "timeout" });
            }
          } else if (this.state === "leaving") {
            if (this.bubbleText) {
              this.bubbleText.destroy();
              this.bubbleText = null;
            }
            if (this.bubbleIcon) {
              this.bubbleIcon.destroy();
              this.bubbleIcon = null;
            }
            const dx = ZONES.DOOR.x - this.x,
              dy = ZONES.DOOR.y - this.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 10) {
              this.sprite.destroy();
              this.state = "gone";
            } else {
              const step = 180 * (delta / 1000);
              this.x += (dx / dist) * step;
              this.y += (dy / dist) * step;
              this.sprite.x = this.x;
              this.sprite.y = this.y;
              updateCharacterDirection(this.sprite, dx, dy, true, this.tempTimer);
            }
          }
        }

        evaluate(placedItems) {
          const wrong = placedItems.filter((i) => i !== this.targetItem);
          if (wrong.length > 0) return { ok: false, reason: "wrong_item" };
          if (placedItems.length !== this.quantity)
            return { ok: false, reason: "wrong_count", count: placedItems.length };
          return { ok: true };
        }

        drawBubble(scene) {
          if (this.state !== "waiting") return;

          // Compact 100×64 bubble anchored to fixed row so slots never overlap
          const bw = 100,
            bh = 64;
          const by = this.bubbleBy ?? 295;
          const bx = this.x - bw / 2;

          scene.bubbleGfx.fillStyle(0xffffff, 0.95);
          scene.bubbleGfx.fillRoundedRect(bx, by, bw, bh, 8);
          scene.bubbleGfx.lineStyle(2, 0x444444, 1);
          scene.bubbleGfx.strokeRoundedRect(bx, by, bw, bh, 8);
          // Tail pointing down toward the animal
          scene.bubbleGfx.fillStyle(0xffffff, 0.95);
          scene.bubbleGfx.fillTriangle(
            this.x - 6,
            by + bh,
            this.x + 6,
            by + bh,
            this.x,
            by + bh + 12,
          );

          // Patience bar (thin strip at bottom of bubble)
          const barW = bw - 10,
            barH = 6;
          const barX = bx + 5,
            barY = by + bh - 10;
          scene.bubbleGfx.fillStyle(0xcccccc, 1);
          scene.bubbleGfx.fillRoundedRect(barX, barY, barW, barH, 3);
          const ratio = Math.max(0, 1 - this.elapsed / this.patience);
          const barColor = ratio > 0.5 ? 0x4caf50 : ratio > 0.25 ? 0xffc107 : 0xf44336;
          scene.bubbleGfx.fillStyle(barColor, 1);
          scene.bubbleGfx.fillRoundedRect(barX, barY, barW * ratio, barH, 3);
        }
      }

      class ShopPlayer {
        constructor(scene) {
          this.scene = scene;
          this.x = 640;
          this.y = 400;
          this.carrying = [];
          this.tempTimer = 0;

          this.sprite = scene.add.sprite(this.x, this.y, "sprite_bird").setScale(3.5).setDepth(15);
        }

        init() {
          this.cursors = this.scene.input.keyboard.createCursorKeys();
          this.keys = this.scene.input.keyboard.addKeys("W,A,S,D");
          this.scene.input.keyboard.on("keydown-SPACE", () => this.tryAction());
        }

        tryAction() {
          if (this.scene.gameState !== "PLAYING") return;
          if (
            Phaser.Math.Distance.Between(this.x, this.y, ZONES.TRASH.x + 40, ZONES.TRASH.y + 40) <
            100
          ) {
            if (this.carrying.length > 0) {
              this.carrying = [];
              this.scene.showMsg("Изчистен инвентар!", 0x4caf50, this.x, this.y);
            }
            return;
          }
          for (const shelf of ZONES.SHELVES) {
            if (Phaser.Math.Distance.Between(this.x, this.y, shelf.x, shelf.y) < 100) {
              if (this.carrying.length >= L2.MAX_CARRY) {
                this.scene.showMsg(
                  `Капацитета е достигнат! (Макс ${L2.MAX_CARRY})`,
                  0xff9800,
                  this.x,
                  this.y,
                );
              } else {
                this.carrying.push(shelf.item);
                this.scene.showMsg(`Взе 1 ${ITEM_NAMES[shelf.item]}`, 0xffffff, this.x, this.y);
                sfx(this.scene, "item_pickup", { volume: 0.7 });
              }
              return;
            }
          }
          const cz = ZONES.COUNTER;
          if (
            this.x > cz.x - 50 &&
            this.x < cz.x + cz.w + 50 &&
            this.y > cz.y - 100 &&
            this.y < cz.y + cz.h + 100
          ) {
            if (this.carrying.length > 0) {
              this.scene.onPlayerPlace([...this.carrying]);
              this.carrying = [];
            } else {
              this.scene.showMsg("Не носиш нищо!", 0xff9800, this.x, this.y);
            }
          }
        }

        update(delta) {
          if (this.scene.gameState !== "PLAYING") return;
          this.tempTimer += delta;
          let dx = 0,
            dy = 0;
          if (this.cursors.left.isDown || this.keys.A.isDown) dx = -1;
          else if (this.cursors.right.isDown || this.keys.D.isDown) dx = 1;
          if (this.cursors.up.isDown || this.keys.W.isDown) dy = -1;
          else if (this.cursors.down.isDown || this.keys.S.isDown) dy = 1;

          const isMoving = dx !== 0 || dy !== 0;

          if (isMoving) {
            if (dx && dy) {
              dx *= 0.707;
              dy *= 0.707;
            }
            this.x = Phaser.Math.Clamp(
              this.x + (dx * L2.PLAYER_SPEED * delta) / 1000,
              100,
              W - 100,
            );
            this.y = Phaser.Math.Clamp(
              this.y + (dy * L2.PLAYER_SPEED * delta) / 1000,
              200,
              H - 100,
            );

            this.sprite.x = this.x;
            this.sprite.y = this.y;
          }

          updateCharacterDirection(this.sprite, dx, dy, isMoving, this.tempTimer);
        }
      }

          this.carriedItemSprites = [];

            const counts = {};
            this.player.carrying.forEach((i) => (counts[i] = (counts[i] || 0) + 1));

              "В ръцете: " +
                Object.entries(counts)
                  .map(([k, v]) => `${v} ${ITEM_NAMES[k]}`)

                ` (Макс ${L2.MAX_CARRY})`,

          this._drawFrame();

        _drawShopLayout() {
          const g = this.add.graphics().setDepth(3);

          ZONES.SHELVES.forEach((shelf) => {
            g.fillStyle(0x8d6e63, 1);
            g.fillRoundedRect(shelf.x - 55, shelf.y - 55, 110, 110, 8);
            g.lineStyle(3, 0x5d4037, 1);
            g.strokeRoundedRect(shelf.x - 55, shelf.y - 55, 110, 110, 8);
            g.fillStyle(0x4e342e, 1);
            g.fillRect(shelf.x - 55, shelf.y + 38, 110, 22);
          });

          ZONES.SHELVES.forEach((shelf) => {
            this.add
              .text(shelf.x, shelf.y + 49, shelf.name, {
                fontFamily: "Arial",

          ZONES.SHELVES.forEach((shelf) => {
            this.add.image(shelf.x, shelf.y, shelf.item).setScale(2.5).setDepth(4);

          const cz = ZONES.COUNTER;
          g.fillStyle(0xa0785a, 1);
          g.fillRoundedRect(cz.x, cz.y, cz.w, cz.h, 10);
          g.lineStyle(4, 0x5d4037, 1);

          g.fillRoundedRect(cz.x + 8, cz.y + 8, cz.w - 16, 18, 6);

            .text(cz.x + cz.w / 2, cz.y + cz.h / 2, "🛒 ГИШЕ", {
              fontFamily: "Arial",
              fontSize: "18px",
              color: "#fff9e7",
              fontStyle: "bold",
            })
            .setOrigin(0.5)
            .setDepth(4);

          const tz = ZONES.TRASH;
          g.fillStyle(0x607d8b, 1);
          g.fillRoundedRect(tz.x + 10, tz.y + 20, tz.w - 20, tz.h - 20, 6);
          g.lineStyle(3, 0x37474f, 1);
          g.strokeRoundedRect(tz.x + 10, tz.y + 20, tz.w - 20, tz.h - 20, 6);
          g.fillStyle(0x455a64, 1);
          g.fillRoundedRect(tz.x + 4, tz.y + 12, tz.w - 8, 14, 4);
          g.lineStyle(2, 0x263238, 1);
          g.strokeRoundedRect(tz.x + 4, tz.y + 12, tz.w - 8, 14, 4);
          g.lineStyle(2, 0x37474f, 0.4);
          for (let i = 0; i < 3; i++) {
            const lx = tz.x + 22 + i * 14;
            g.lineBetween(lx, tz.y + 26, lx, tz.y + tz.h - 8);
          }
          this.add
            .text(tz.x + tz.w / 2, tz.y + tz.h + 10, "🗑 ИЗХВЪРЛИ", {
              fontFamily: "Arial",
              fontSize: "13px",
              color: "#b0bec5",
              fontStyle: "bold",
            })
            .setOrigin(0.5, 0)
            .setDepth(4);
        }

        _drawFrame() {
          this.bubbleGfx.clear();
          this.customers.forEach((c) => {
            c.drawBubble(this);
          });
        }

        onPlayerPlace(items) {
          const waiting = this.customers.filter((c) => c.state === "waiting");
          if (waiting.length === 0) {
            this.showMsg("Няма чакащ клиент тук!", 0xff9800, this.player.x, this.player.y);
            return;
          }
          let closest = waiting[0],
            minD = Infinity;
          waiting.forEach((c) => {
            const d = Phaser.Math.Distance.Between(this.player.x, this.player.y, c.x, c.y);
            if (d < minD) {
              minD = d;
              closest = c;
            }
          });

          this.serveX = closest.x;

          this.counterItemSprites.forEach((s) => s.destroy());
          this.counterItemSprites = [];
          items.forEach((item, i) => {
            const col = i % 5,
              row = Math.floor(i / 5);
            const img = this.add
              .image(ZONES.COUNTER.x + 50 + col * 40, ZONES.COUNTER.y + 40 - row * 20, item)
              .setScale(2)
              .setDepth(12);
            this.counterItemSprites.push(img);
          });

          this.onCustomerEvaluated(closest, closest.evaluate(items));
        }

        onCustomerEvaluated(customer, result) {
          customer.state = "leaving";
          this.customerSlots[customer.slotIndex].occupied = false;
          this.time.delayedCall(1500, () => {
            this.counterItemSprites.forEach((s) => s.destroy());
            this.counterItemSprites = [];
          });

          if (result.ok) {
            this.served++;
            this.showMsg(
              `✅ Точно ${customer.quantity}! Браво!`,
              0x4caf50,
              this.player.x,
              this.player.y,
            );
            sfx(this, "cash_register", { volume: 0.8 });
          } else {
            this.errors++;
            let msg = "❌ Грешка!";
            if (result.reason === "timeout") msg = "⏳ Клиентът си тръгна!";
            else if (result.reason === "wrong_item")
              msg = `❌ Искаше ${ITEM_NAMES[customer.targetItem]}!`;
            else if (result.reason === "wrong_count")
              msg = `❌ Искаше ${customer.quantity}, а ти даде ${result.count}!`;
            this.showMsg(msg, 0xf44336, this.player.x, this.player.y);
            sfx(this, "customer_sad", { volume: 0.7 });
          }

          this.scoreText.setText(`🌟 Успешни: ${this.served} / ${L2.TARGET_SCORE}`);
          this.errorText.setText(`❌ Грешки: ${this.errors} / ${L2.MAX_ERRORS}`);
          this.checkEnd();
        }

        checkEnd() {
          if (this.errors >= L2.MAX_ERRORS) {
            showGameOverScreen(this, "ЗАГУБА! ОПИТАЙ ПАК!", "#ff5252");
          } else if (this.served >= L2.TARGET_SCORE) {
            this.gameState = "OVER";
            if (this.bgm) this.bgm.stop();
            this.time.delayedCall(700, () => {
              this.cameras.main.fade(600, 0, 0, 0, false, (_, p) => {
                if (p >= 1) this.scene.start("Transition2Scene");
              });
            });
          }
        }
      }

      // ============================================================
      // LEVEL 3: PARTY SCENE (ОБНОВЕНО С ПОДЧЕРТАВАЩИ СВЕТЕЩИ ЗОНИ)

      class PartyScene extends Phaser.Scene {
        constructor() {
          super({ key: "PartyScene" });
        }
        preload() {
          preloadCommonAssets(this);
        }
        create() {
          document.getElementById("game-title").textContent = "🎊 ГОРСКИ ПРАЗНИК 🎊";
          document.getElementById("game-subtitle").textContent =
            "Трета група · Математика · Пространствени отношения · Украси за празника!";

          this.gameState = "PLAYING";
          this.errors = 0;
          this.carrying = null;
          this.tempTimer = 0;

          this.add.image(0, 0, "outside_day").setOrigin(0).setDisplaySize(W, H);

          this.birdSprite = this.add.sprite(640, 300, "sprite_bird").setScale(3.5).setDepth(15);

          this.doneTasks = 0;

          this.pickups = this.tasks.map((t) => ({
            taskId: t.id,

          }));

          this.add.sprite(180, 520, "sprite_bear").setScale(3.5).setFrame(4);

          this.wasd = this.input.keyboard.addKeys("W,A,S,D");
          this.input.keyboard.on("keydown-SPACE", () => this.tryAction());
          this.input.keyboard.on("keydown-ESC", () => {
            if (this.gameState !== "PLAYING") return;
            this.gameState = "PAUSED";
            if (this.bgm) this.bgm.pause();
            this.scene.launch("PauseScene", { caller: this });
          });

          this.add.rectangle(0, 0, W, 58, 0x1a0a2e).setOrigin(0, 0).setDepth(24);
          this.scoreText = this.add
            .text(20, 14, `🎊 Украси: 0 / ${this.totalTasks}`, {
              fontFamily: "Arial",
              fontSize: "26px",
              color: "#f3e5f5",
              fontStyle: "bold",
            })
            .setDepth(25);
          this.errorText = this.add
            .text(W - 20, 14, `❌ Грешки: 0 / ${L3.MAX_ERRORS}`, {
              fontFamily: "Arial",
              fontSize: "26px",
              color: "#ff8a80",
              fontStyle: "bold",
            })
            .setOrigin(1, 0)
            .setDepth(25);
          this.hintText = this.add
            .text(W / 2, 66, "", {
              fontFamily: "Arial",
              fontSize: "24px",
              color: "#fff9c4",
              fontStyle: "bold",
              stroke: "#1a0a2e",
              strokeThickness: 5,
            })
            .setOrigin(0.5, 0)
            .setDepth(25);

          this.pickupLabels = this.tasks.map((t) => {

              .text(t.pickupX, t.pickupY + 30, t.decorName, {

          this._showNextHint();

        _showNextHint() {
          const next = this.tasks.find((t) => !t.done);
          if (!next) {
            this.hintText.setText("Всички украси са наредени! 🎉");
            return;
          }
          this.hintText.setText(`👉 ${next.hint}`);

          // ── VOICE INSTRUCTION ────────────────────────────────────────────────
          // Recommended voice: warm, slow, child-friendly Bulgarian girl voice (7-9 y.o.)
          // Loaded via: preloadCommonAssets → scene.load.audio('voice_hint_0', 'assets/voice/hint_0.mp3')
          // Each audio file reads the hint text aloud with emphasis on the spatial keyword.
          // Example: hint_0.mp3 = "Сложи балонА ... НАД ... вратата на магазина!"
          //          hint_1.mp3 = "Сложи гирлянда ... МЕЖДУ ... двата камъка!"
          //          hint_2.mp3 = "Сложи фенерА ... ДО ... мечката!"
          //          hint_3.mp3 = "Сложи цветето ... ПОД ... вратата!"
          //          hint_4.mp3 = "Сложи звездата ... ВДЯСНО ... от вратата!"
          // Stop previous voice before playing next to avoid overlapping:
          // if (this.sound.get('voice_hint_' + (next.id - 1))) this.sound.stopByKey('voice_hint_' + (next.id - 1));
          // this.sound.play('voice_hint_' + next.id, { volume: 0.9 });
          // ─────────────────────────────────────────────────────────────────────
        }

        _drawDecoration(g, type, x, y, s = 1) {
          switch (type) {
            case "balloon":
              g.fillStyle(0xff5252);
              g.fillCircle(x, y, 16 * s);
              break;
            case "garland":
              for (let i = 0; i < 5; i++) {
                g.fillStyle(i % 2 ? 0xffeb3b : 0x4caf50);
                g.fillCircle(x - 20 + i * 10, y, 6 * s);
              }
              break;
            case "lantern":
              g.fillStyle(0xffd54f);
              g.fillRect(x - 10, y - 15, 20 * s, 30 * s);
              break;
            case "flower":
              g.fillStyle(0xf06292);
              for (let i = 0; i < 5; i++)
                g.fillCircle(x + Math.cos(i) * 10, y + Math.sin(i) * 10, 8 * s);
              break;
            case "star":
              g.fillStyle(0xffee58);
              g.fillCircle(x, y, 15 * s);
              break;
          }
        }

        tryAction() {
          if (this.gameState !== "PLAYING") return;
          const bx = this.birdSprite.x,
            by = this.birdSprite.y;

          if (!this.carrying) {
            let closest = null,
              minD = 90;
            this.pickups.forEach((p) => {
              if (p.picked) return;
              const d = Phaser.Math.Distance.Between(bx, by, p.x, p.y);
              if (d < minD) {
                minD = d;
                closest = p;
              }
            });
            if (closest) {
              closest.picked = true;
              this.carrying = this.tasks[closest.taskId];
              this.pickupLabels[closest.taskId].setVisible(false);
              this.showMsg(`Взе ${this.carrying.decorName}!`, 0xffee58, bx, by);
              this.hintText.setText(`📍 ${this.carrying.hint}`);
            }
          } else {
            const t = this.carrying.target;
            const inZone =
              bx >= t.cx - t.hw && bx <= t.cx + t.hw && by >= t.cy - t.hh && by <= t.cy + t.hh;

            if (inZone && !this.carrying.done) {
              this.carrying.done = true;
              this.placedDecorations.push({ type: this.carrying.decoration, x: t.cx, y: t.cy });
              this.doneTasks++;
              this.carrying = null;
              this.scoreText.setText(`🎊 Украси: ${this.doneTasks} / ${this.totalTasks}`);
              sfx(this, "decoration_place", { volume: 0.75 });
              this._showNextHint();
              if (this.doneTasks === this.totalTasks) {
                this.gameState = "OVER";
                if (this.bgm) this.bgm.stop();
                sfx(this, "confetti_burst", { volume: 0.9 });
                this.time.delayedCall(900, () => this.scene.start("CutsceneScene"));
              }
            } else {
              this.errors++;
              this.errorText.setText(`❌ Грешки: ${this.errors} / ${L3.MAX_ERRORS}`);
              sfx(this, "wrong_zone", { volume: 0.7 });
              if (this.errors >= L3.MAX_ERRORS) {
                showGameOverScreen(this, "ОПИТАЙ ПАК!", "#ef9a9a");
              } else {
                this.showMsg("❌ Не е правилното място!", 0xf44336, bx, by);
              }
            }
          }
        }

        showMsg(text, color, x, y) {
          const t = this.add
            .text(x, y - 75, text, {
              fontFamily: "Arial",
              fontSize: "20px",
              color: "#" + color.toString(16).padStart(6, "0"),
              fontStyle: "bold",
              stroke: "#000",
              strokeThickness: 4,
            })
            .setOrigin(0.5)
            .setDepth(50);
          this.tweens.add({
            targets: t,
            y: t.y - 55,
            alpha: 0,
            duration: 2500,
            onComplete: () => t.destroy(),
          });
        }

        update(_, delta) {
          if (this.gameState !== "PLAYING") return;
          this.tempTimer += delta;
          let dx = 0,
            dy = 0;
          if (this.cursors.left.isDown || this.wasd.A.isDown) dx = -1;
          else if (this.cursors.right.isDown || this.wasd.D.isDown) dx = 1;
          if (this.cursors.up.isDown || this.wasd.W.isDown) dy = -1;
          else if (this.cursors.down.isDown || this.wasd.S.isDown) dy = 1;

          const isMoving = dx !== 0 || dy !== 0;

          if (isMoving) {
            if (dx && dy) {
              dx *= 0.707;
              dy *= 0.707;
            }
            this.birdSprite.x = Phaser.Math.Clamp(
              this.birdSprite.x + (dx * L3.BIRD_SPEED * delta) / 1000,
              20,
              W - 20,
            );
            this.birdSprite.y = Phaser.Math.Clamp(
              this.birdSprite.y + (dy * L3.BIRD_SPEED * delta) / 1000,
              62,
              H - 40,
            );
          }

          updateCharacterDirection(this.birdSprite, dx, dy, isMoving, this.tempTimer);

          this.decorGfx.clear();
          this.mainGfx.clear();

          this.placedDecorations.forEach((d) =>
            this._drawDecoration(this.decorGfx, d.type, d.x, d.y, 1.2),
          );

          this.pickups.forEach((p) => {
            if (!p.picked) {
              this.mainGfx.lineStyle(3, 0xffd54f, 0.45);
              this.mainGfx.strokeCircle(p.x, p.y, 26);
              this._drawDecoration(this.mainGfx, this.tasks[p.taskId].decoration, p.x, p.y);
            }
          });

          // ── ANIMATED ARROWS pointing to the active target zone ──────────────
          // No filled rectangles — just clean arrows so the background stays visible.
          const activeTask = this.carrying ? this.carrying : this.tasks.find((tt) => !tt.done);

          if (activeTask) {
            const t = activeTask.target;
            // Свети зелено, ако играчът в момента носи точния предмет за целта
            const isCorrect = this.carrying && this.carrying.id === activeTask.id;
            const col = isCorrect ? 0x00e676 : activeTask.arrowColor || 0xffd54f;
            const bounce = Math.sin(this.tempTimer * 0.005) * 6;

            // Draw 4 inward-pointing arrows around the target centre
            const drawArrow = (ax, ay, angle) => {
              const len = 22,
                head = 10;
              const cos = Math.cos(angle),
                sin = Math.sin(angle);
              const tx = ax + cos * len,
                ty = ay + sin * len;
              this.mainGfx.lineStyle(4, col, 0.92);
              this.mainGfx.beginPath();
              this.mainGfx.moveTo(ax, ay);
              this.mainGfx.lineTo(tx, ty);
              this.mainGfx.strokePath();
              // Arrow head
              this.mainGfx.fillStyle(col, 0.92);
              const lx = tx - cos * head + sin * (head * 0.5);
              const ly = ty - sin * head - cos * (head * 0.5);
              const rx = tx - cos * head - sin * (head * 0.5);
              const ry = ty - sin * head + cos * (head * 0.5);
              this.mainGfx.fillTriangle(tx, ty, lx, ly, rx, ry);
            };

            const gap = 36; // distance from centre to arrow base
            // Top arrow (pointing down ↓)
            drawArrow(t.cx, t.cy - t.hh - gap + bounce, Math.PI / 2);
            // Bottom arrow (pointing up ↑)
            drawArrow(t.cx, t.cy + t.hh + gap - bounce, -Math.PI / 2);
            // Left arrow (pointing right →)
            drawArrow(t.cx - t.hw - gap + bounce, t.cy, 0);
            // Right arrow (pointing left ←)
            drawArrow(t.cx + t.hw + gap - bounce, t.cy, Math.PI);

            // Small "ТУК" label centred on target — no background box
            if (!this.zoneHintText) {
              this.zoneHintText = this.add
                .text(t.cx, t.cy, "ТУК", {
                  fontFamily: "Arial",
                  fontSize: "18px",
                  fontStyle: "bold",
                  color: "#ffffff",
                  stroke: "#000000",
                  strokeThickness: 4,
                })
                .setOrigin(0.5)
                .setDepth(11);
            }
            this.zoneHintText
              .setPosition(t.cx, t.cy)
              .setVisible(true)
              .setColor(isCorrect ? "#00e676" : "#ffffff")
              .setText(isCorrect ? "✅ ТУК!" : "ТУК");
          } else {
            if (this.zoneHintText) this.zoneHintText.setVisible(false);
          }

          if (this.carrying) {
            this._drawDecoration(
              this.mainGfx,
              this.carrying.decoration,
              this.birdSprite.x,
              this.birdSprite.y + 40,
              0.8,
            );
          }
        }
      }

      // ============================================================
      // FINAL CUTSCENE SCENE
      // ============================================================
      class CutsceneScene extends Phaser.Scene {
        constructor() {
          super({ key: "CutsceneScene" });
        }
        preload() {
          preloadCommonAssets(this);
        }
        create() {
          this.add.image(0, 0, "outside_day").setOrigin(0).setDisplaySize(W, H);
          this.add.rectangle(0, 0, W, H, 0x000000, 0.6).setOrigin(0);

          this.add
            .text(W / 2, H / 2 - 50, "🎉 ПОБЕДА! 🎉\nМагазинът е изцяло готов и украсен!", {
              fontFamily: "Arial",
              fontSize: "52px",
              color: "#fff9c4",
              fontStyle: "bold",
              align: "center",
              stroke: "#000",
              strokeThickness: 6,
            })
            .setOrigin(0.5);

          this.add
            .text(W / 2, H / 2 + 80, "Натисни SPACE за да започнеш отначало", {
              fontFamily: "Arial",
              fontSize: "22px",
              color: "#c8e6c9",
            })
            .setOrigin(0.5);

          // ── Confetti system ──
          this.confetti = [];
          for (let i = 0; i < 80; i++) {
            this.confetti.push({
              x: Math.random() * W,
              y: -20 - Math.random() * H,
              vx: (Math.random() - 0.5) * 100,
              vy: 90 + Math.random() * 120,
              col: [0xf44336, 0xffeb3b, 0x4caf50, 0x2196f3, 0xff9800, 0xe91e63, 0xce93d8, 0xffffff][
                Math.floor(Math.random() * 8)
              ],
              w: 6 + Math.random() * 8,
              h: 10 + Math.random() * 14,
              rot: Math.random() * Math.PI,
              rotSpeed: (Math.random() - 0.5) * 4,
              wobble: Math.random() * Math.PI * 2,
            });
          }

          // ── Fireworks ──
          this.fireworks = [];
          this.fwTimer = 0;
          this.fxGfx = this.add.graphics().setDepth(20);
          this.confGfx = this.add.graphics().setDepth(19);

          this.t = 0;
          this.input.keyboard.once("keydown-SPACE", () => {
            if (this.bgm) this.bgm.stop();
            this.cameras.main.fade(400, 0, 0, 0, false, (_, p) => {
              if (p >= 1) this.scene.start("StartScene");
            });
          });
          this.cameras.main.fadeIn(700);

          // ── Victory BGM ──
          this.bgm = this.sound.add("victory_theme", { loop: false, volume: 0.6 });
          this.bgm.play();
        }

        _spawnFw(x, y) {
          const col = [0xf44336, 0xffeb3b, 0x4caf50, 0x2196f3, 0xff9800, 0xce93d8, 0xffffff][
            Math.floor(Math.random() * 7)
          ];
          for (let i = 0; i < 26; i++) {
            const a = (i / 26) * Math.PI * 2,
              sp = 130 + Math.random() * 110;
            this.fireworks.push({
              x,
              y,
              vx: Math.cos(a) * sp,
              vy: Math.sin(a) * sp,
              life: 1,
              col,
              r: 3 + Math.random() * 4,
            });
          }
          // Play firework sound effect
          sfx(this, "firework", { volume: 0.6 });
        }

        update(_, delta) {
          this.t += delta / 1000;
          this.fwTimer += delta;

          if (this.fwTimer > 1100) {
            this.fwTimer = 0;
            this._spawnFw(120 + Math.random() * (W - 240), 60 + Math.random() * 200);
          }

          // Fireworks physics
          this.fireworks = this.fireworks.filter((p) => {
            p.x += (p.vx * delta) / 1000;
            p.y += (p.vy * delta) / 1000;
            p.vy += (80 * delta) / 1000;
            p.life -= (1.3 * delta) / 1000;
            return p.life > 0;
          });

          // Draw fireworks + confetti
          this.fxGfx.clear();
          this.confGfx.clear();

          this.fireworks.forEach((p) => {
            this.fxGfx.fillStyle(p.col, p.life * 0.9);
            this.fxGfx.fillCircle(p.x, p.y, p.r * p.life);
          });

          this.confetti.forEach((c) => {
            c.y += (c.vy * delta) / 1000;
            c.x += (c.vx * delta) / 1000 + Math.sin(this.t * 2 + c.wobble) * 0.7;
            c.rot += (c.rotSpeed * delta) / 1000;
            if (c.y > H + 20) {
              c.y = -15;
              c.x = Math.random() * W;
            }
            this.confGfx.fillStyle(c.col, 0.88);
            // Rotated rect via 4 points
            const hw = c.w / 2,
              hh = c.h / 2;
            const cos = Math.cos(c.rot),
              sin = Math.sin(c.rot);
            const pts = [
              { x: c.x + cos * -hw - sin * -hh, y: c.y + sin * -hw + cos * -hh },
              { x: c.x + cos * hw - sin * -hh, y: c.y + sin * hw + cos * -hh },
              { x: c.x + cos * hw - sin * hh, y: c.y + sin * hw + cos * hh },
              { x: c.x + cos * -hw - sin * hh, y: c.y + sin * -hw + cos * hh },
            ];
            this.confGfx.fillPoints(pts, true);
          });
        }
      }

      // ============================================================
      // LAUNCH GAME
      // ============================================================
      const _game = new Phaser.Game({
        type: Phaser.CANVAS,
        width: W,
        height: H,
        canvas: document.getElementById("gameCanvas"),
        pixelArt: true,
        scene: [
          StartScene,
          ForestScene,
          TransitionScene,
          ShopScene,
          Transition2Scene,
          PartyScene,
          CutsceneScene,
          PauseScene,
        ],
      });
      unlockAudio(_game);
    </script>
  </body>
</html>
